name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gate:
    name: Type-check + lint + access-matrix + cross-check + user-flows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # lets check:access-matrix diff against origin/main for the migration tripwire
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx eslint .
      - run: npm run check:access-matrix
      - run: npm run check:cross-check
      - run: npm run check:user-flows
