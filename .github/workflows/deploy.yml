name: Build and Deploy KushHR
on:
  push:
    branches: [main]
env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: hr20july2026
  ECR_REGISTRY: 255655478523.dkr.ecr.us-east-1.amazonaws.com
permissions:
  id-token: write
  contents: read
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Debug secret length
        run: |
          echo "ARN length: ${#ARN}"
          echo "First 20 chars: [${ARN:0:20}]"
          echo "Last 15 chars: [${ARN: -15}]"
        env:
          ARN: ${{ secrets.AWS_ROLE_ARN }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_SUPABASE_URL=http://3.214.161.23:8000 \
            --build-arg NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Get ECR login password
        id: ecr-login
        run: echo "password=$(aws ecr get-login-password --region ${{ env.AWS_REGION }})" >> $GITHUB_OUTPUT
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "${{ steps.ecr-login.outputs.password }}" | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
            cd ~/New_HR_APP/infra/supabase
            docker compose pull web
            docker compose up -d web
